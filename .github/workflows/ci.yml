name: CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    services:
      mysql:
        image: mysql:8.0.29
        env:
          MYSQL_ROOT_PASSWORD: tempdbpassword
          MYSQL_DATABASE: pizza
        ports:
          - "3306:3306"
        options: >-
          --health-cmd "mysqladmin ping -ptempdbpassword" 
          --health-interval 10s 
          --health-timeout 5s 
          --health-retries 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Write config file for Testing
        run: |
          cat <<EOF > src/config.js
          module.exports = {
            jwtSecret: '${{ secrets.JWTSECRET }}',
            db: {
              connection: {
                host: '127.0.0.1',
                user: 'root',
                password: 'tempdbpassword',
                database: 'pizza',
                connectTimeout: 60000,
              },
              listPerPage: 10,
            },
            factory: {
              url: 'https://pizza-factory.cs329.click',
              apiKey: '${{ secrets.FACTORY_API_KEY }}',
            },
          };
          EOF

      - name: Tests
        run: npm test

      - name: Set version
        id: set_version
        run: |
          version=$(date +'%Y%m%d.%H%M%S')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          printf '{"version": "%s" }' "$version" > src/version.json

      - name: Update coverage
        run: |
          coverage=$(jq '.total.lines.pct' coverage/coverage-summary.json)
          color=$(echo "$coverage < 80" | bc | awk '{if ($1) print "red"; else print "green"}')
          curl -s -X POST "https://pizza-factory.cs329.click/api/badge/${{ secrets.NET_ID }}/jwtpizzaservicecoverage?label=Coverage&value=$coverage%25&color=$color" -H "authorization: bearer ${{ secrets.FACTORY_API_KEY }}"

      - name: Create dist and write Production config
        run: |
          mkdir dist
          cp Dockerfile dist
          cp -r src/* dist
          cp *.json dist
          # Note: The app will read from process.env in production, 
          # but we keep this file generation for consistency.
          cat <<EOF > dist/config.js
          module.exports = {
            jwtSecret: '${{ secrets.JWTSECRET }}',
            db: {
              connection: {
                host: process.env.DB_HOSTNAME,
                user: process.env.DB_USERNAME,
                password: process.env.DB_PASSWORD,
                database: process.env.DB_NAME,
                connectTimeout: 60000,
              },
              listPerPage: 10,
            },
            factory: {
              url: 'https://pizza-factory.cs329.click',
              apiKey: '${{ secrets.FACTORY_API_KEY }}',
            },
            metrics: {
              source: 'jwt-pizza-service',
              endpointUrl: '${{ secrets.METRICS_ENDPOINT_URL }}',
              apiKey: '${{ secrets.METRICS_API_KEY }}',
              accountId: '${{ secrets.METRICS_ACCOUNT_ID_KEY }}',
            },
          };
          EOF

      - name: Update distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: dist/

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: build
    env:
      version: ${{needs.build.outputs.version}}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: package

      - name: Create OIDC token to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT }}:role/${{ secrets.CI_IAM_ROLE }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Inject GitHub Secrets into Task Definition
        run: |
          sed -i "s|REPLACE_DB_HOST|${{ secrets.DB_HOSTNAME }}|g" task-definition.json
          sed -i "s|REPLACE_DB_USER|${{ secrets.DB_USERNAME }}|g" task-definition.json
          sed -i "s|REPLACE_DB_PASSWORD|${{ secrets.DB_PASSWORD }}|g" task-definition.json
          sed -i "s|REPLACE_DB_NAME|${{ secrets.DB_NAME }}|g" task-definition.json
          sed -i "s|REPLACE_METRICS_ENDPOINT_URL|${{secrets.METRICS_ENDPOINT_URL}}|g" task-definition.json
          sed -i "s|REPLACE_METRICS_API_KEY|${{secrets.METRICS_API_KEY}}|g" task-definition.json
          sed -i "s|REPLACE_METRICS_ACCOUNT_ID|${{secrets.METRICS_ACCOUNT_ID}}|g" task-definition.json

      - name: Set up machine emulation
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker build
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: "jwt-pizza-service"
        run: |
          docker build --no-cache --platform=linux/arm64 -t $ECR_REGISTRY/$ECR_REPOSITORY:latest --push .
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: jwt-pizza-service
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: jwt-pizza-service-new
          cluster: jwt-pizza-service-new
          wait-for-service-stability: true
